<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>HyperMap Explorer</title>
	<meta name="description" content="Browse and interact with HyperMap resources">
	<meta property="og:title" content="HyperMap Explorer">
	<meta property="og:description" content="Browse and interact with HyperMap resources">
	<meta property="og:type" content="website">
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
			margin: 0;
			padding: 0;
			height: 100vh;
			overflow: hidden;
			background-color: white;
			color: #1d1d1f;
			line-height: 1.47;
		}

		.main-container {
			display: flex;
			height: 100%;
		}

		/* Left Sidebar */
		.sidebar {
			width: 250px;
			background-color: #f8f9fa;
			border-radius: 16px;
			margin: 8px;
			box-shadow: 4px 4px 12px rgb(82, 93, 135);
			display: flex;
			flex-direction: column;
			min-width: 200px;
			max-width: 500px;
			position: relative;
		}

		.sidebar-resizer {
			position: absolute;
			top: 0;
			right: 0;
			width: 4px;
			height: 100%;
			cursor: col-resize;
			background: transparent;
			z-index: 10;
		}

		.sidebar-resizer:hover {
			background: transparent;
		}

		.sidebar-header {
			padding: 14px 8px 4px;
		}

		.sidebar-header h1 {
			margin: 0;
			font-size: 17px;
			font-weight: 600;
			color: #1d1d1f;
			letter-spacing: -0.022em;
		}

		.url-form {
			padding: 4px;
		}

		.url-form input {
			width: 100%;
			padding: 4px 2px;
			font-size: 14px;
		}

		.tab-list {
			flex: 1;
			overflow-y: auto;
			padding: 4px;
		}

		.tab-item {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 4px;
			margin-bottom: 2px;
			border-radius: 4px;
			border: 1px solid transparent;
			transition: background-color 0.1s ease;
		}

		.tab-item:hover {
			background-color: color-mix(in srgb, #0ea5e9 10%, transparent);
		}

		.tab-item.active {
			background-color: #0ea5e9;
			color: white;
		}

		.tab-item.active .tab-close {
			color: white;
			opacity: 0.8;
		}

		.tab-item.active .tab-close:hover {
			opacity: 1;
		}

		.tab-info {
			flex: 1;
			min-width: 0;
			cursor: default;
		}

		.tab-url {
			font-size: 13px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			color: inherit;
			opacity: 0.9;
		}

		.tab-close {
			margin-left: 8px;
			padding: 2px;
			background: none;
			border: none;
			color: #999;
			font-size: 16px;
		}

		.tab-close:hover {
			color: #666;
		}

		/* Main Content */
		.content-area {
			flex: 1;
			overflow-y: auto;
			position: relative;
		}

		.tab-content {
			padding: 0;
			margin-top: 32px;
			font-family: monospace;
		}

		.empty-state {
			text-align: center;
			padding: 48px 24px;
			color: #86868b;
			font-size: 15px;
		}

		/* Map Display */
		.map {
			padding-left: 8px;
			margin-bottom: 0;
		}

		.map-field {
			margin: 2px 0;
		}

		.map-field.inline label {
			display: flex;
			align-items: baseline;
			gap: 6px;
		}

		.map-label {
			font-weight: 500;
			color: #1d1d1f;
		}

		.map input {
			padding: 2px;
			font-family: monospace;
			font-size: inherit;
		}

		.map ul {
			list-style: none;
			padding-left: 0;
			margin: 0;
		}

		.map li {
			padding-left: 12px;
			margin-bottom: 0;
		}

		.map a {
			color: #007aff;
			text-decoration: none;
		}

		.map a:hover {
			text-decoration: underline;
		}

		.map form {
			margin: 0;
		}

		.map label {
			display: flex;
			align-items: baseline;
			gap: 6px;
		}

		.map label span {
			font-weight: 500;
			color: #1d1d1f;
		}

		.map button {
			padding: 2px 4px;
			margin-top: 0;
			font-family: monospace;
			font-size: inherit;
		}

		/* Mobile sidebar drawer */
		.sidebar-open,
		.sidebar-close {
			display: none;
		}

		.sidebar-overlay {
			display: none;
		}

		@media (max-width: 767px) {
			.sidebar {
				position: fixed;
				top: 0;
				left: 0;
				height: 100%;
				z-index: 40;
				transform: translateX(-100%);
				transition: transform 0.25s ease-in-out, box-shadow 0.25s ease-in-out;
				width: 280px;
				min-width: unset;
				max-width: unset;
				box-shadow: none;
			}

			#sidebarToggle:checked ~ .sidebar {
				transform: translateX(0);
				box-shadow: 2px 0 8px rgb(0 0 0 / 0.15);
			}

			#sidebarToggle:checked ~ .sidebar-overlay {
				display: block;
			}

			.sidebar-resizer {
				display: none;
			}

			.sidebar-open {
				display: block;
				position: absolute;
				top: 16px;
				left: 16px;
				z-index: 20;
				background: #f8f9fa;
				border: 1px solid #e5e5e7;
				font-size: 20px;
				padding: 4px 10px;
				cursor: pointer;
			}

			.sidebar-close {
				display: inline-block;
				background: none;
				border: none;
				font-size: 22px;
				cursor: pointer;
				padding: 0;
				color: #666;
			}

			.sidebar-close:hover {
				color: #000;
			}

			.sidebar-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			.sidebar-overlay {
				position: fixed;
				inset: 0;
				z-index: 30;
				cursor: default;
			}
		}

		@media (prefers-color-scheme: dark) {
			body {
				background-color: #1c1c1e;
				color: #f2f2f7;
			}

			.sidebar {
				background-color: #2c2c2e;
				box-shadow: 4px 4px 12px rgb(0, 0, 0);
			}

			.sidebar-header h1 {
				color: #f2f2f7;
			}



			.empty-state {
				color: #8e8e93;
			}

			.map-label {
				color: #f2f2f7;
			}

			.map label span {
				color: #f2f2f7;
			}

			.sidebar-open {
				background-color: #2c2c2e;
				border-color: #38383a;
				color: #f2f2f7;
			}

			.sidebar-close {
				color: #8e8e93;
			}

			.sidebar-close:hover {
				color: #f2f2f7;
			}
		}
	</style>
</head>

<body>
	<div class="main-container">
		<input type="checkbox" id="sidebarToggle" hidden>

		<!-- Left Sidebar - Tab List -->
		<div class="sidebar">
			<div class="sidebar-resizer"></div>
			<div class="sidebar-header">
				<h1>HyperMap Explorer</h1>
				<label for="sidebarToggle" class="sidebar-close" aria-label="Close sidebar">&times;</label>
			</div>

			<!-- URL Input -->
			<div class="url-form">
				<form id="urlForm">
					<input type="text" id="urlInput" placeholder="Enter HyperMap URL..."
						value="hypermap-example.deno.dev/">
				</form>
			</div>

			<!-- Tab List -->
			<div class="tab-list">
				<div id="tabList">
					<!-- Tabs will be dynamically inserted here -->
				</div>
			</div>
		</div>

		<!-- Overlay for mobile drawer dismiss -->
		<label for="sidebarToggle" class="sidebar-overlay"></label>

		<!-- Main Content Area -->
		<div class="content-area">
			<!-- Mobile sidebar toggle -->
			<label for="sidebarToggle" class="sidebar-open" aria-label="Open sidebar">&#9776;</label>
			<div id="tabContent" class="tab-content">
				<div class="empty-state">
					No tabs open. Enter a HyperMap URL to get started.
				</div>
			</div>
		</div>
	</div>

	<script type="module">
		import 'https://cdn.jsdelivr.net/npm/@hypermap/mech@0.10.0/+esm';

		// State management
		let activeTabIndex = -1;
		const tabChangeListeners = new Map();
		let isResizing = false;

		// Initialize
		document.addEventListener('DOMContentLoaded', () => {
			document.getElementById('urlForm').addEventListener('submit', handleUrlSubmit);

			// Set up sidebar resizing
			const resizer = document.querySelector('.sidebar-resizer');
			const sidebar = document.querySelector('.sidebar');

			resizer.addEventListener('mousedown', (e) => {
				isResizing = true;
				document.addEventListener('mousemove', handleResize);
				document.addEventListener('mouseup', stopResize);
				e.preventDefault();
			});

			function handleResize(e) {
				if (!isResizing) return;
				const newWidth = e.clientX;
				if (newWidth >= 200 && newWidth <= 500) {
					sidebar.style.width = newWidth + 'px';
				}
			}

			function stopResize() {
				isResizing = false;
				document.removeEventListener('mousemove', handleResize);
				document.removeEventListener('mouseup', stopResize);
			}

			renderTabs();
		});

		async function handleUrlSubmit(e) {
			e.preventDefault();
			const raw = document.getElementById('urlInput').value.trim();
			if (raw) {
				const url = new URL(raw.includes('://') ? raw : 'https://' + raw);
				await openTab(url.href);
				document.getElementById('urlInput').value = '';
			}
		}

		async function openTab(url) {
			const tab = await Mech.open(url);
			const tabIndex = Mech.tabs.length - 1;

			// Set up change listener
			const listener = () => {
				if (activeTabIndex === tabIndex) {
					renderTabContent(tab);
					}
			}
			tab.addEventListener('changed', listener);
			tabChangeListeners.set(tabIndex, listener);

			renderTabs();
			selectTab(tabIndex);

			// Initial render with timeout
			setTimeout(() => {
				if (activeTabIndex === tabIndex) {
					renderTabContent(tab);
				}
			}, 100);
		}

		function selectTab(index) {
			activeTabIndex = index;
			renderTabs();
			if (index >= 0 && index < Mech.tabs.length) {
				renderTabContent(Mech.tabs[index]);
			}
			// Update debug view if open
			if (debugPanelOpen) {
				updateDebugView();
			}
			// Close mobile drawer
			document.getElementById('sidebarToggle').checked = false;
		}

		function closeTab(index, e) {
			if (e) {
				e.stopPropagation();
			}

			// Remove listener
			const listener = tabChangeListeners.get(index);
			if (listener) {
				const tab = Mech.tabs[index];
				if (tab) {
					tab.removeEventListener('changed', listener);
				}
				tabChangeListeners.delete(index);
			}

			// Remove tab using Mech.closeTab
			const tab = Mech.tabs[index];
			if (tab) {
				Mech.closeTab(tab);
			}

			// Update all listener mappings since indices have shifted
			const newListeners = new Map();
			tabChangeListeners.forEach((listener, oldIndex) => {
				if (oldIndex > index) {
					newListeners.set(oldIndex - 1, listener);
				} else if (oldIndex < index) {
					newListeners.set(oldIndex, listener);
				}
			});
			tabChangeListeners.clear();
			newListeners.forEach((listener, idx) => {
				tabChangeListeners.set(idx, listener);
			});

			// Adjust active tab
			if (activeTabIndex >= Mech.tabs.length) {
				activeTabIndex = Mech.tabs.length - 1;
			} else if (activeTabIndex > index) {
				activeTabIndex--;
			}

			renderTabs();
			if (activeTabIndex >= 0) {
				renderTabContent(Mech.tabs[activeTabIndex]);
			} else {
				document.getElementById('tabContent').innerHTML = `
										<div class="empty-state">
												No tabs open. Enter a HyperMap URL to get started.
										</div>
								`;
			}
		}

		function renderTabs() {
			const tabList = document.getElementById('tabList');
			tabList.innerHTML = '';

			Mech.tabs.forEach((tab, index) => {
				const tabEl = document.createElement('div');
				tabEl.className = `tab-item ${activeTabIndex === index ? 'active' : ''}`;
				tabEl.onclick = () => selectTab(index);

				const parsed = new URL(tab.url);
				const displayUrl = parsed.host + parsed.pathname + parsed.search + parsed.hash;

				const tabInfo = document.createElement('div');
				tabInfo.className = 'tab-info';
				tabInfo.innerHTML = `
										<div class="tab-url">${displayUrl}</div>
								`;

				const closeButton = document.createElement('button');
				closeButton.className = 'tab-close';
				closeButton.innerHTML = '×';
				closeButton.onclick = (e) => closeTab(index, e);

				tabEl.appendChild(tabInfo);
				tabEl.appendChild(closeButton);
				tabList.appendChild(tabEl);
			});
		}

		function renderTabContent(tab) {
			const content = document.getElementById('tabContent');

			if (!tab.hypermap) {
				content.innerHTML = `
										<div class="empty-state">
												Loading...
										</div>
								`;
				return;
			}

			// Save focus state before re-rendering
			const activeElement = document.activeElement;
			let focusPath = null;
			let focusValue = '';
			let selectionStart = 0;
			let selectionEnd = 0;

			if (activeElement && activeElement.dataset && activeElement.dataset.path) {
				focusPath = activeElement.dataset.path;
				focusValue = activeElement.value;
				selectionStart = activeElement.selectionStart;
				selectionEnd = activeElement.selectionEnd;
			}

			content.innerHTML = '';
			content.appendChild(renderHypermap(tab.hypermap, []));

			// Restore focus if needed
			if (focusPath) {
				const inputs = content.querySelectorAll('input[data-path]');
				for (const input of inputs) {
					if (input.dataset.path === focusPath) {
						input.focus();
						input.value = focusValue;
						input.setSelectionRange(selectionStart, selectionEnd);
						break;
					}
				}
			}
		}

		function renderHypermap(hypermap, path) {
			// Check for control type first
			const metadata = hypermap['#'] || {};
			const isControl = metadata.type === 'control';
			const nonMetadataKeys = Object.keys(hypermap).filter(k => k !== '#');

			// If this is a control with no other keys, just return a link
			if (isControl && nonMetadataKeys.length === 0) {
				const link = document.createElement('a');
				link.href = '#';
				link.textContent = path[path.length - 1] || 'Control';
				link.onclick = (e) => {
					e.preventDefault();
					if (activeTabIndex >= 0) {
						const tab = Mech.tabs[activeTabIndex];
						tab.use(path);
					}
				};
				return link;
			}

			// For everything else, create a container
			const container = document.createElement('div');
			container.className = 'map';

			// If this is a control with other keys, render as form
			if (isControl && nonMetadataKeys.length > 0) {
				const form = document.createElement('form');

				nonMetadataKeys.forEach(key => {
					const label = document.createElement('label');

					const span = document.createElement('span');
					span.textContent = key + ':';
					label.appendChild(span);

					const input = document.createElement('input');
					input.type = 'text';
					input.value = hypermap[key] !== null && hypermap[key] !== undefined ? hypermap[key].toString() : '';
					input.dataset.path = JSON.stringify(path.concat([key]));
					input.addEventListener('input', handleValueChange);
					label.appendChild(input);

					form.appendChild(label);
				});

				const button = document.createElement('button');
				button.type = 'submit';
				button.textContent = 'Submit';
				form.appendChild(button);

				form.onsubmit = (e) => {
					e.preventDefault();
					if (activeTabIndex >= 0) {
						const tab = Mech.tabs[activeTabIndex];
						tab.use(path);
					}
				};

				container.appendChild(form);
				return container;
			}

			// Regular rendering for non-controls
			// Calculate max label width among primitive siblings (for alignment)
			const maxLabelLen = Object.entries(hypermap).reduce((max, [key, value]) => {
				if (key === '#') return max;
				if (value === null || value === undefined || (typeof value !== 'object' && !Array.isArray(value))) {
					return Math.max(max, key.length + 1); // +1 for ":"
				}
				return max;
			}, 0);

			Object.entries(hypermap).forEach(([key, value]) => {
				if (key === '#') return; // Skip metadata

				const field = document.createElement('div');
				field.className = 'map-field';

				// Link control
				if (value && typeof value === 'object' && value['#'] && value['#'].type === 'control' && Object.keys(value).filter(k => k !== '#').length === 0) {
					field.appendChild(renderHypermap(value, path.concat([key])));
					container.appendChild(field);
					return;
				}

				if (value === null || value === undefined || (typeof value !== 'object' && !Array.isArray(value))) {
					// Primitive value: inline label + input
					field.className = 'map-field inline';
					const label = document.createElement('label');
					label.className = 'map-label';

					const span = document.createElement('span');
					span.textContent = key + ':';
					span.style.minWidth = maxLabelLen + 'ch';
					label.appendChild(span);

					const input = document.createElement('input');
					input.type = 'text';
					input.value = value !== null && value !== undefined ? value.toString() : '';
					input.dataset.path = JSON.stringify(path.concat([key]));
					input.addEventListener('input', handleValueChange);
					label.appendChild(input);

					field.appendChild(label);
				} else {
					// Non-primitive: label above, then rendered child
					const label = document.createElement('div');
					label.className = 'map-label';
					label.textContent = key + ':';
					field.appendChild(label);

					if (Array.isArray(value)) {
						const ul = document.createElement('ul');
						value.forEach((item, index) => {
							const li = document.createElement('li');
							li.appendChild(renderHypermap(item, path.concat([key, index.toString()])));
							ul.appendChild(li);
						});
						field.appendChild(ul);
					} else if (value && typeof value === 'object') {
						field.appendChild(renderHypermap(value, path.concat([key])));
					}
				}

				container.appendChild(field);
			});

			return container;
		}

		function handleValueChange(e) {
			const path = JSON.parse(e.target.dataset.path);
			const value = e.target.value;

			if (activeTabIndex >= 0) {
				const tab = Mech.tabs[activeTabIndex];
				tab.input(path, value);
			}
		}

		async function handleFetch(href) {
			console.log('Fetch:', href);
			await openTab(href);
		}
	</script>
</body>

</html>
